name: docker-smoke

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t elixir-stakeholder .
      - run: docker run --rm elixir-stakeholder --list-values
      - run: docker run --rm elixir-stakeholder --focus-family code_analyzer --output-format json --seed docker-code
      - run: docker run --rm elixir-stakeholder --focus-family data_processing --output-format json --seed docker-data
      - run: docker run --rm elixir-stakeholder --focus-family agent_workflows --output-format json --seed docker-agent
      - run: docker run --rm elixir-stakeholder --focus-family delivery_preview_ops --output-format json --seed docker-delivery
      - run: |
          first=$(docker run --rm elixir-stakeholder --focus-family platform_engineering --output-format json --seed same-seed)
          second=$(docker run --rm elixir-stakeholder --focus-family platform_engineering --output-format json --seed same-seed)
          test "$first" = "$second"
      - run: |
          set +e
          output=$(docker run --rm elixir-stakeholder --experimental-provider openai-compatible 2>&1)
          status=$?
          set -e
          test $status -ne 0
          printf '%s' "$output" | grep -q 'experimental-provider is not implemented yet in elixir-stakeholder'
